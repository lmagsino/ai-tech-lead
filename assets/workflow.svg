<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="founderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="ctoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" rx="12" fill="#0d1117"/>

  <!-- Header -->
  <text x="480" y="42" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700" letter-spacing="0.5">AI Tech Lead</text>
  <text x="480" y="64" text-anchor="middle" fill="#8b949e" font-size="13">Your AI technical co-founder. Three personas. One workflow.</text>

  <!-- Divider -->
  <line x1="80" y1="82" x2="880" y2="82" stroke="#21262d" stroke-width="1"/>

  <!-- === PERSONA CARDS === -->

  <!-- Founder Card -->
  <rect x="40" y="100" width="273" height="100" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="100" width="273" height="4" rx="2" fill="url(#founderGrad)"/>
  <circle cx="68" cy="134" r="14" fill="#667eea" opacity="0.15"/>
  <text x="68" y="139" text-anchor="middle" font-size="14">&#128161;</text>
  <text x="92" y="132" fill="#e6edf3" font-size="14" font-weight="600">Founder</text>
  <text x="92" y="150" fill="#8b949e" font-size="11">Idea to developer handoff</text>
  <text x="92" y="168" fill="#8b949e" font-size="11">Plain language, business context</text>
  <text x="92" y="186" fill="#667eea" font-size="10" font-weight="500">CTO WHO NEVER SLEEPS</text>

  <!-- Developer Card -->
  <rect x="343" y="100" width="273" height="100" rx="10" fill="#161b22" stroke="#f5576c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="343" y="100" width="273" height="4" rx="2" fill="url(#devGrad)"/>
  <circle cx="371" cy="134" r="14" fill="#f5576c" opacity="0.15"/>
  <text x="371" y="139" text-anchor="middle" font-size="14">&#128187;</text>
  <text x="395" y="132" fill="#e6edf3" font-size="14" font-weight="600">Developer</text>
  <text x="395" y="150" fill="#8b949e" font-size="11">Feature to shipped code</text>
  <text x="395" y="168" fill="#8b949e" font-size="11">File paths, line numbers, costs</text>
  <text x="395" y="186" fill="#f5576c" font-size="10" font-weight="500">SENIOR TECH LEAD</text>

  <!-- Tech Founder Card -->
  <rect x="646" y="100" width="273" height="100" rx="10" fill="#161b22" stroke="#4facfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="646" y="100" width="273" height="4" rx="2" fill="url(#ctoGrad)"/>
  <circle cx="674" cy="134" r="14" fill="#4facfe" opacity="0.15"/>
  <text x="674" y="139" text-anchor="middle" font-size="14">&#9889;</text>
  <text x="698" y="132" fill="#e6edf3" font-size="14" font-weight="600">Tech Founder</text>
  <text x="698" y="150" fill="#8b949e" font-size="11">Full journey, both hats</text>
  <text x="698" y="168" fill="#8b949e" font-size="11">Strategy + engineering</text>
  <text x="698" y="186" fill="#4facfe" font-size="10" font-weight="500">CO-FOUNDER</text>

  <!-- === WORKFLOW SECTION === -->

  <text x="480" y="240" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">The Mode Chain</text>
  <text x="480" y="258" text-anchor="middle" fill="#8b949e" font-size="11">Each mode produces an artifact the next mode reads</text>

  <!-- Product Thinking Row -->
  <text x="52" y="295" fill="#667eea" font-size="10" font-weight="600" letter-spacing="1">PRODUCT</text>

  <!-- /strategy -->
  <rect x="120" y="278" width="120" height="44" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1.2"/>
  <text x="180" y="296" text-anchor="middle" fill="#667eea" font-size="12" font-weight="600">/strategy</text>
  <text x="180" y="312" text-anchor="middle" fill="#8b949e" font-size="9">STRATEGY.md</text>

  <!-- Arrow -->
  <line x1="244" y1="300" x2="270" y2="300" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- /design -->
  <rect x="274" y="278" width="120" height="44" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1.2"/>
  <text x="334" y="296" text-anchor="middle" fill="#667eea" font-size="12" font-weight="600">/design</text>
  <text x="334" y="312" text-anchor="middle" fill="#8b949e" font-size="9">DESIGN.md</text>

  <!-- Arrow -->
  <line x1="398" y1="300" x2="424" y2="300" stroke="#30363d" stroke-width="1.5"/>

  <!-- /roadmap -->
  <rect x="428" y="278" width="120" height="44" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1.2"/>
  <text x="488" y="296" text-anchor="middle" fill="#667eea" font-size="12" font-weight="600">/roadmap</text>
  <text x="488" y="312" text-anchor="middle" fill="#8b949e" font-size="9">ROADMAP.md</text>

  <!-- Handoff arrow -->
  <line x1="552" y1="300" x2="578" y2="300" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Handoff box -->
  <rect x="582" y="282" width="90" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="627" y="304" text-anchor="middle" fill="#8b949e" font-size="10">Handoff</text>

  <!-- /review floating -->
  <rect x="730" y="278" width="100" height="44" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="780" y="296" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">/review</text>
  <text x="780" y="312" text-anchor="middle" fill="#6e7681" font-size="9">any artifact</text>

  <!-- Engineering Row -->
  <text x="37" y="370" fill="#f5576c" font-size="10" font-weight="600" letter-spacing="1">ENGINEERING</text>

  <!-- /challenge -->
  <rect x="120" y="353" width="105" height="44" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="172" y="371" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/challenge</text>
  <text x="172" y="387" text-anchor="middle" fill="#8b949e" font-size="9">scopes/</text>

  <line x1="229" y1="375" x2="249" y2="375" stroke="#30363d" stroke-width="1.5"/>

  <!-- /blueprint -->
  <rect x="253" y="353" width="105" height="44" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="305" y="371" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/blueprint</text>
  <text x="305" y="387" text-anchor="middle" fill="#8b949e" font-size="9">specs/</text>

  <line x1="362" y1="375" x2="382" y2="375" stroke="#30363d" stroke-width="1.5"/>

  <!-- /forge -->
  <rect x="386" y="353" width="105" height="44" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="438" y="371" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/forge</text>
  <text x="438" y="387" text-anchor="middle" fill="#8b949e" font-size="9">code</text>

  <line x1="495" y1="375" x2="515" y2="375" stroke="#30363d" stroke-width="1.5"/>

  <!-- /guard -->
  <rect x="519" y="353" width="105" height="44" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="571" y="371" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/guard</text>
  <text x="571" y="387" text-anchor="middle" fill="#8b949e" font-size="9">scorecard</text>

  <line x1="628" y1="375" x2="648" y2="375" stroke="#30363d" stroke-width="1.5"/>

  <!-- /launch -->
  <rect x="652" y="353" width="105" height="44" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="704" y="371" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/launch</text>
  <text x="704" y="387" text-anchor="middle" fill="#8b949e" font-size="9">GO / NO-GO</text>

  <!-- /hunt floating -->
  <rect x="800" y="353" width="100" height="44" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="850" y="371" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">/hunt</text>
  <text x="850" y="387" text-anchor="middle" fill="#6e7681" font-size="9">fix + RCA</text>

  <!-- Vertical connector: product to engineering -->
  <line x1="488" y1="326" x2="305" y2="349" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === HARD STOPS === -->

  <line x1="80" y1="425" x2="880" y2="425" stroke="#21262d" stroke-width="1"/>

  <text x="480" y="455" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Hard Stops</text>
  <text x="480" y="473" text-anchor="middle" fill="#8b949e" font-size="11">Non-negotiable. She will not proceed past these.</text>

  <!-- Hard stop items - row 1 -->
  <rect x="40" y="490" width="280" height="52" rx="8" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="48" y="498" width="4" height="36" rx="2" fill="#f85149"/>
  <text x="64" y="512" fill="#f85149" font-size="10" font-weight="700">NO SPEC = NO BUILD</text>
  <text x="64" y="528" fill="#8b949e" font-size="10">/forge requires /blueprint first</text>

  <rect x="340" y="490" width="280" height="52" rx="8" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="348" y="498" width="4" height="36" rx="2" fill="#f85149"/>
  <text x="364" y="512" fill="#f85149" font-size="10" font-weight="700">CRITICAL = BLOCKS MERGE</text>
  <text x="364" y="528" fill="#8b949e" font-size="10">/guard won't approve with CRITICAL findings</text>

  <rect x="640" y="490" width="280" height="52" rx="8" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="648" y="498" width="4" height="36" rx="2" fill="#f85149"/>
  <text x="664" y="512" fill="#f85149" font-size="10" font-weight="700">NO FALLBACK = NO APPROVAL</text>
  <text x="664" y="528" fill="#8b949e" font-size="10">AI components need failure handling</text>

  <!-- Hard stop items - row 2 -->
  <rect x="40" y="554" width="280" height="52" rx="8" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="48" y="562" width="4" height="36" rx="2" fill="#f85149"/>
  <text x="64" y="576" fill="#f85149" font-size="10" font-weight="700">NO TEST = BUG STAYS OPEN</text>
  <text x="64" y="592" fill="#8b949e" font-size="10">/hunt requires regression test</text>

  <rect x="340" y="554" width="280" height="52" rx="8" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="348" y="562" width="4" height="36" rx="2" fill="#f85149"/>
  <text x="364" y="576" fill="#f85149" font-size="10" font-weight="700">NO COST ESTIMATE = NO AI</text>
  <text x="364" y="592" fill="#8b949e" font-size="10">/blueprint requires tokens x volume</text>

  <rect x="640" y="554" width="280" height="52" rx="8" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="648" y="562" width="4" height="36" rx="2" fill="#f85149"/>
  <text x="664" y="576" fill="#f85149" font-size="10" font-weight="700">CRITICAL = NO-GO</text>
  <text x="664" y="592" fill="#8b949e" font-size="10">/launch blocks on unresolved CRITICALs</text>

  <!-- === QUICK START === -->

  <line x1="80" y1="628" x2="880" y2="628" stroke="#21262d" stroke-width="1"/>

  <!-- Quick start boxes -->
  <rect x="40" y="645" width="280" height="58" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1"/>
  <text x="180" y="666" text-anchor="middle" fill="#667eea" font-size="11" font-weight="600">FOUNDERS</text>
  <rect x="60" y="675" width="240" height="20" rx="4" fill="#0d1117"/>
  <text x="180" y="690" text-anchor="middle" fill="#7ee787" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">/strategy "your idea here"</text>

  <rect x="340" y="645" width="280" height="58" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1"/>
  <text x="480" y="666" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">DEVELOPERS</text>
  <rect x="360" y="675" width="240" height="20" rx="4" fill="#0d1117"/>
  <text x="480" y="690" text-anchor="middle" fill="#7ee787" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">/challenge "feature idea"</text>

  <rect x="640" y="645" width="280" height="58" rx="8" fill="#161b22" stroke="#4facfe" stroke-width="1"/>
  <text x="780" y="666" text-anchor="middle" fill="#4facfe" font-size="11" font-weight="600">TECH FOUNDERS</text>
  <rect x="660" y="675" width="240" height="20" rx="4" fill="#0d1117"/>
  <text x="780" y="690" text-anchor="middle" fill="#7ee787" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">/strategy "your idea here"</text>

</svg>
