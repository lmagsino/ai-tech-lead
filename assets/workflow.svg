<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="founderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="ctoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" rx="12" fill="#0d1117"/>

  <!-- === PERSONA CARDS === -->

  <!-- Founder -->
  <rect x="40" y="24" width="273" height="72" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <rect x="40" y="24" width="273" height="3" rx="2" fill="url(#founderGrad)"/>
  <text x="60" y="52" fill="#e6edf3" font-size="14" font-weight="600">Founder</text>
  <text x="60" y="70" fill="#8b949e" font-size="11">Idea to developer handoff</text>
  <text x="60" y="86" fill="#667eea" font-size="9" font-weight="500">CTO WHO NEVER SLEEPS</text>

  <!-- Developer -->
  <rect x="343" y="24" width="273" height="72" rx="10" fill="#161b22" stroke="#f5576c" stroke-width="1.5"/>
  <rect x="343" y="24" width="273" height="3" rx="2" fill="url(#devGrad)"/>
  <text x="363" y="52" fill="#e6edf3" font-size="14" font-weight="600">Developer</text>
  <text x="363" y="70" fill="#8b949e" font-size="11">Feature to shipped code</text>
  <text x="363" y="86" fill="#f5576c" font-size="9" font-weight="500">SENIOR TECH LEAD</text>

  <!-- Tech Founder -->
  <rect x="646" y="24" width="273" height="72" rx="10" fill="#161b22" stroke="#4facfe" stroke-width="1.5"/>
  <rect x="646" y="24" width="273" height="3" rx="2" fill="url(#ctoGrad)"/>
  <text x="666" y="52" fill="#e6edf3" font-size="14" font-weight="600">Tech Founder</text>
  <text x="666" y="70" fill="#8b949e" font-size="11">Full journey, both hats</text>
  <text x="666" y="86" fill="#4facfe" font-size="9" font-weight="500">CO-FOUNDER</text>

  <!-- === MODE CHAIN === -->

  <line x1="80" y1="116" x2="880" y2="116" stroke="#21262d" stroke-width="1"/>

  <!-- Product row label -->
  <text x="52" y="157" fill="#667eea" font-size="10" font-weight="600" letter-spacing="1">PRODUCT</text>

  <!-- /strategy -->
  <rect x="130" y="138" width="115" height="40" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1.2"/>
  <text x="187" y="155" text-anchor="middle" fill="#667eea" font-size="11" font-weight="600">/strategy</text>
  <text x="187" y="170" text-anchor="middle" fill="#8b949e" font-size="9">STRATEGY.md</text>

  <line x1="249" y1="158" x2="273" y2="158" stroke="#30363d" stroke-width="1.5"/>

  <!-- /design -->
  <rect x="277" y="138" width="115" height="40" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1.2"/>
  <text x="334" y="155" text-anchor="middle" fill="#667eea" font-size="11" font-weight="600">/design</text>
  <text x="334" y="170" text-anchor="middle" fill="#8b949e" font-size="9">DESIGN.md</text>

  <line x1="396" y1="158" x2="420" y2="158" stroke="#30363d" stroke-width="1.5"/>

  <!-- /roadmap -->
  <rect x="424" y="138" width="115" height="40" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1.2"/>
  <text x="481" y="155" text-anchor="middle" fill="#667eea" font-size="11" font-weight="600">/roadmap</text>
  <text x="481" y="170" text-anchor="middle" fill="#8b949e" font-size="9">ROADMAP.md</text>

  <line x1="543" y1="158" x2="567" y2="158" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Handoff -->
  <rect x="571" y="141" width="80" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="611" y="162" text-anchor="middle" fill="#8b949e" font-size="10">Handoff</text>

  <!-- /review floating -->
  <rect x="710" y="138" width="95" height="40" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="757" y="155" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">/review</text>
  <text x="757" y="170" text-anchor="middle" fill="#6e7681" font-size="9">any artifact</text>

  <!-- Engineering row label -->
  <text x="37" y="225" fill="#f5576c" font-size="10" font-weight="600" letter-spacing="1">ENGINEERING</text>

  <!-- /challenge -->
  <rect x="130" y="206" width="100" height="40" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="180" y="223" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/challenge</text>
  <text x="180" y="238" text-anchor="middle" fill="#8b949e" font-size="9">scopes/</text>

  <line x1="234" y1="226" x2="252" y2="226" stroke="#30363d" stroke-width="1.5"/>

  <!-- /blueprint -->
  <rect x="256" y="206" width="100" height="40" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="306" y="223" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/blueprint</text>
  <text x="306" y="238" text-anchor="middle" fill="#8b949e" font-size="9">specs/</text>

  <line x1="360" y1="226" x2="378" y2="226" stroke="#30363d" stroke-width="1.5"/>

  <!-- /forge -->
  <rect x="382" y="206" width="100" height="40" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="432" y="223" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/forge</text>
  <text x="432" y="238" text-anchor="middle" fill="#8b949e" font-size="9">code</text>

  <line x1="486" y1="226" x2="504" y2="226" stroke="#30363d" stroke-width="1.5"/>

  <!-- /guard -->
  <rect x="508" y="206" width="100" height="40" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="558" y="223" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/guard</text>
  <text x="558" y="238" text-anchor="middle" fill="#8b949e" font-size="9">scorecard</text>

  <line x1="612" y1="226" x2="630" y2="226" stroke="#30363d" stroke-width="1.5"/>

  <!-- /launch -->
  <rect x="634" y="206" width="100" height="40" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1.2"/>
  <text x="684" y="223" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="600">/launch</text>
  <text x="684" y="238" text-anchor="middle" fill="#8b949e" font-size="9">GO / NO-GO</text>

  <!-- /hunt floating -->
  <rect x="790" y="206" width="95" height="40" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="837" y="223" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">/hunt</text>
  <text x="837" y="238" text-anchor="middle" fill="#6e7681" font-size="9">fix + RCA</text>

  <!-- Connector: product to engineering -->
  <line x1="481" y1="182" x2="306" y2="202" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === HARD STOPS (compact) === -->

  <line x1="80" y1="268" x2="880" y2="268" stroke="#21262d" stroke-width="1"/>

  <text x="480" y="294" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Hard Stops</text>

  <!-- 3 hard stops in a row -->
  <rect x="40" y="310" width="186" height="40" rx="6" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="46" y="316" width="3" height="28" rx="1.5" fill="#f85149"/>
  <text x="58" y="328" fill="#f85149" font-size="10" font-weight="700">NO SPEC = NO BUILD</text>
  <text x="58" y="342" fill="#8b949e" font-size="9">/forge requires /blueprint</text>

  <rect x="240" y="310" width="186" height="40" rx="6" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="246" y="316" width="3" height="28" rx="1.5" fill="#f85149"/>
  <text x="258" y="328" fill="#f85149" font-size="10" font-weight="700">CRITICAL = BLOCKED</text>
  <text x="258" y="342" fill="#8b949e" font-size="9">/guard blocks merge</text>

  <rect x="440" y="310" width="186" height="40" rx="6" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="446" y="316" width="3" height="28" rx="1.5" fill="#f85149"/>
  <text x="458" y="328" fill="#f85149" font-size="10" font-weight="700">NO FALLBACK = REJECTED</text>
  <text x="458" y="342" fill="#8b949e" font-size="9">AI needs failure handling</text>

  <rect x="640" y="310" width="138" height="40" rx="6" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="646" y="316" width="3" height="28" rx="1.5" fill="#f85149"/>
  <text x="658" y="328" fill="#f85149" font-size="10" font-weight="700">NO TEST = OPEN</text>
  <text x="658" y="342" fill="#8b949e" font-size="9">/hunt needs regression</text>

  <rect x="792" y="310" width="128" height="40" rx="6" fill="#161b22" stroke="#f8514966" stroke-width="1"/>
  <rect x="798" y="316" width="3" height="28" rx="1.5" fill="#f85149"/>
  <text x="810" y="328" fill="#f85149" font-size="10" font-weight="700">CRITICAL = NO-GO</text>
  <text x="810" y="342" fill="#8b949e" font-size="9">/launch blocks</text>

  <!-- === QUICK START === -->

  <line x1="80" y1="370" x2="880" y2="370" stroke="#21262d" stroke-width="1"/>

  <rect x="40" y="386" width="430" height="38" rx="8" fill="#161b22" stroke="#667eea" stroke-width="1"/>
  <text x="55" y="409" fill="#667eea" font-size="10" font-weight="600">FOUNDERS</text>
  <rect x="130" y="393" width="320" height="24" rx="4" fill="#0d1117"/>
  <text x="290" y="410" text-anchor="middle" fill="#7ee787" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">/strategy "your idea here"</text>

  <rect x="490" y="386" width="430" height="38" rx="8" fill="#161b22" stroke="#f5576c" stroke-width="1"/>
  <text x="505" y="409" fill="#f5576c" font-size="10" font-weight="600">DEVELOPERS</text>
  <rect x="600" y="393" width="300" height="24" rx="4" fill="#0d1117"/>
  <text x="750" y="410" text-anchor="middle" fill="#7ee787" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">/challenge "feature idea"</text>

</svg>
